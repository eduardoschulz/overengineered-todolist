info:
  name: Update Task
  type: http
  seq: 4

vars:
  token: ''
  task_id: ''

http:
  method: PUT
  url: http://localhost:8000/tasks/{{task_id}}
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer {{token}}
  body: |
    {
      "title": "Review PR #42 (updated)",
      "status": "done"
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
